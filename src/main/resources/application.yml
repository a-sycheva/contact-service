spring:
  application:
    name: contact-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/contact_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false

server:
  port: 8081

logging:
  level:
    ru.mentee.power.crm: DEBUG
    org.springframework.web: INFO
    liquibase: DEBUG